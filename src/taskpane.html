<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Mailgröße</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="taskpane.css" />
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <h1>Aktuelle Mailgröße</h1>

    <div class="size-box">
      <div class="size-row">
        <span class="label">Text (Body):</span>
        <span id="bodySize" class="value">–</span>
      </div>
      <div class="size-row">
        <span class="label">Anhänge:</span>
        <span id="attachSize" class="value">–</span>
      </div>
      <div class="size-row total">
        <span class="label">Rohgröße gesamt:</span>
        <span id="totalSize" class="value">–</span>
      </div>
      <div class="size-row estimate">
        <span class="label">Geschätzte Sendegröße*:</span>
        <span id="estimateSize" class="value">–</span>
      </div>
    </div>

    <div id="attachList" class="attach-list"></div>

    <div id="warning" class="warning hidden"></div>

    <button id="refreshBtn">Jetzt aktualisieren</button>

    <p class="note">
      * MIME-Kodierung (Base64) vergrößert Anhänge beim Versand um ca. 37 %.
      Aktualisiert sich automatisch alle 3 Sekunden.
    </p>
  </div>
  <script type="text/javascript" src="taskpane.js"></script>
</body>
</html>
